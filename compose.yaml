name: cs85-php-programming

services:
    mysql:
        image: mysql:9
        container_name: cs85-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${CS85_MYSQL_DATABASE:-cs85_php_programming}
            MYSQL_USER: ${CS85_MYSQL_USER:-cs85}
            MYSQL_PASSWORD: ${CS85_MYSQL_PASSWORD:-cs85_password}
            MYSQL_ROOT_PASSWORD: ${CS85_MYSQL_ROOT_PASSWORD:-cs85_root_password}
        ports:
            - '${CS85_MYSQL_HOST_PORT:-3307}:3306'
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test:
                [
                    'CMD',
                    'mysqladmin',
                    'ping',
                    '-h',
                    '127.0.0.1',
                    '-u',
                    '${CS85_MYSQL_USER:-cs85}',
                    '-p${CS85_MYSQL_PASSWORD:-cs85_password}',
                ]
            interval: 5s
            timeout: 5s
            retries: 20

    redis:
        image: redis:7-alpine
        container_name: cs85-redis
        restart: unless-stopped
        ports:
            - '${CS85_REDIS_HOST_PORT:-6379}:6379'
        volumes:
            - redis-data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 20

    mailpit:
        image: axllent/mailpit:latest
        container_name: cs85-mailpit
        restart: unless-stopped
        ports:
            - '${CS85_MAILPIT_SMTP_PORT:-1025}:1025'
            - '${CS85_MAILPIT_UI_PORT:-8025}:8025'

    adminer:
        image: adminer:latest
        container_name: cs85-adminer
        restart: unless-stopped
        ports:
            - '${CS85_ADMINER_PORT:-8081}:8080'
        depends_on:
            mysql:
                condition: service_healthy

volumes:
    mysql-data:
    redis-data:
